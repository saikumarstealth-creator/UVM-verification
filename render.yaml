# Render.com deployment - Free Tier (Single Service)
# Full Stack: FastAPI Backend + Vite React Frontend
# 
# Steps:
#   1. Push repo to GitHub/GitLab
#   2. Go to https://dashboard.render.com/select-repo
#   3. Connect your repo - Render auto-detects this file
#   4. Deploy (free tier)
# 
# URLs after deployment:
#   - UI: https://uvm-tb-generator.onrender.com
#   - API: https://uvm-tb-generator.onrender.com/api
#   - API Docs: https://uvm-tb-generator.onrender.com/docs
#
# Notes:
#   - Free tier spins down after 15 mins inactivity (cold start: ~15-30s)
#   - Generation takes longer in free tier (resource constraints)

services:
  - type: web
    name: uvm-tb-generator
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    
    buildCommand: |
      # Install Python dependencies
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install -r backend/requirements.txt
      
      # Install Node.js and build frontend
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs
      
      cd frontend
      npm install
      npm run build
      cd ..

    startCommand: |
      python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120
    
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: UVICORN_TIMEOUT
        value: "300"
      
    healthCheckPath: /health
    autoDeploy: true
    
    # Optional: Persistent disk for generated files (free tier: 1GB max)
    # disk:
    #   name: uvmgen-output
    #   mountPath: /opt/render/project/src/output
    #   sizeGB: 1

